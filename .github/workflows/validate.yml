name: Validate Auto Research

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Check version consistency
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const version = fs.readFileSync('VERSION', 'utf8').trim();
          const constants = fs.readFileSync('src/constants.ts', 'utf8');
          const plugin = JSON.parse(fs.readFileSync('.opencode-plugin/plugin.json', 'utf8'));
          const readme = fs.readFileSync('README.md', 'utf8');

          const mismatches = [];
          if (pkg.version !== version) mismatches.push(\`package.json (\${pkg.version}) vs VERSION (\${version})\`);
          if (!constants.includes('VERSION = \"' + version + '\"')) mismatches.push('src/constants.ts');
          if (plugin.version !== version) mismatches.push('.opencode-plugin/plugin.json');
          if (!readme.includes('v' + version)) mismatches.push('README.md version banner');

          if (mismatches.length > 0) {
            console.error('Version mismatch:', mismatches.join(', '));
            process.exit(1);
          }
          console.log('Version aligned:', version);
          "

      - name: Verify package contents
        run: npm run verify:pack

      - name: Run tests
        run: npm test

      - name: Check for absolute local paths in docs
        run: |
          ! grep -r "/Users/\|/home/" README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md wiki docs .opencode-plugin

      - name: Check for stale public positioning
        run: |
          ! grep -r "Claude Code only\|Claude-only" README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md wiki docs .opencode-plugin
