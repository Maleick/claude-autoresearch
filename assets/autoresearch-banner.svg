<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <style>
      .ui { font-family: 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'Cascadia Code', 'Fira Code', monospace; }
      .gradient-bg { fill: url(#bgGradient); }
    </style>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="context-stroke"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- Section dividers -->
  <line x1="380" y1="30" x2="380" y2="390" stroke="#21262d" stroke-width="1"/>
  <line x1="820" y1="30" x2="820" y2="390" stroke="#21262d" stroke-width="1"/>

  <!-- ===== LEFT: Title block ===== -->
  <text x="56" y="130" class="ui" font-size="48" font-weight="700" fill="#e6edf3">Auto Research</text>
  <text x="56" y="165" class="ui" font-size="15" fill="#8b949e">Autonomous recursive self-improvement engine</text>

  <!-- v3.3.1 pill -->
  <rect x="56" y="182" width="80" height="24" rx="12" fill="#1a2f1a" stroke="#238636" stroke-width="1"/>
  <text x="96" y="198" class="ui" font-size="12" font-weight="600" fill="#3fb950" text-anchor="middle">v3.3.1</text>

  <!-- Tagline -->
  <text x="56" y="250" class="ui" font-size="16" fill="#c9d1d9">Fire it before bed.</text>
  <text x="56" y="272" class="ui" font-size="16" fill="#c9d1d9">Wake up to measurable progress.</text>

  <!-- Core loop label -->
  <text x="56" y="340" class="ui" font-size="11" fill="#58a6ff" letter-spacing="2">SELF-IMPROVING LOOP</text>
  <line x1="56" y1="346" x2="240" y2="346" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>

  <!-- Recursive icon -->
  <circle cx="320" cy="100" r="30" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.3"/>
  <path d="M 305 100 A 15 15 0 0 1 335 100" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== CENTER: Enhanced diamond loop diagram ===== -->
  <!-- Arrow: PLAN to MODIFY -->
  <path d="M 610 78 Q 670 78 670 118" fill="none" stroke="#a371f7" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow: MODIFY to VERIFY -->
  <path d="M 670 158 Q 670 188 640 198" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow: VERIFY to KEEP/DISCARD -->
  <path d="M 580 198 Q 550 188 550 158" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow: KEEP/DISCARD to LEARN -->
  <path d="M 550 118 Q 550 88 590 78" fill="none" stroke="#30a14e" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow: LEARN to PLAN (closing the outer loop) -->
  <path d="M 610 58 Q 520 40 480 100 Q 460 140 520 180" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Node: PLAN -->
  <rect x="570" y="58" width="80" height="28" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="610" y="76" class="ui" font-size="11" font-weight="700" fill="#a371f7" text-anchor="middle">PLAN</text>

  <!-- Node: MODIFY -->
  <rect x="630" y="118" width="80" height="28" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="670" y="136" class="ui" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">MODIFY</text>

  <!-- Node: VERIFY -->
  <rect x="560" y="178" width="80" height="28" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="600" y="196" class="ui" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">VERIFY</text>

  <!-- Node: KEEP/DISCARD -->
  <rect x="490" y="118" width="100" height="28" rx="8" fill="#161b22" stroke="#30a14e" stroke-width="1.5"/>
  <text x="540" y="132" class="ui" font-size="10" font-weight="700" fill="#30a14e" text-anchor="middle">KEEP</text>
  <text x="540" y="143" class="ui" font-size="8" fill="#6e7681" text-anchor="middle">or discard</text>

  <!-- Node: LEARN -->
  <rect x="490" y="58" width="80" height="28" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="530" y="76" class="ui" font-size="11" font-weight="700" fill="#f0883e" text-anchor="middle">LEARN</text>

  <!-- Center label -->
  <text x="610" y="168" class="ui" font-size="10" fill="#6e7681" text-anchor="middle">recursive</text>
  <text x="610" y="180" class="ui" font-size="10" fill="#6e7681" text-anchor="middle">self-improvement</text>

  <!-- Subagent pool indicator -->
  <text x="610" y="250" class="ui" font-size="10" fill="#8b949e" text-anchor="middle">subagent-first orchestration</text>
  <rect x="520" y="260" width="180" height="60" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="530" y="278" class="mono" font-size="9" fill="#58a6ff">orchestrator</text>
  <text x="530" y="292" class="mono" font-size="9" fill="#a371f7">scout • analyst</text>
  <text x="530" y="306" class="mono" font-size="9" fill="#30a14e">verifier • synthesizer</text>

  <!-- ===== RIGHT: Terminal window ===== -->
  <rect x="848" y="46" width="316" height="328" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Title bar -->
  <path d="M 858 46 Q 848 46 848 56 L 848 80 L 1164 80 L 1164 56 Q 1164 46 1154 46 Z" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="872" cy="63" r="5.5" fill="#ff5f57"/>
  <circle cx="892" cy="63" r="5.5" fill="#ffbd2e"/>
  <circle cx="912" cy="63" r="5.5" fill="#28c840"/>
  <!-- Window title -->
  <text x="1006" y="67" class="ui" font-size="11" fill="#6e7681" text-anchor="middle">autoresearch --mode background</text>

  <!-- Column headers -->
  <text x="864" y="106" class="mono" font-size="11" fill="#6e7681">iter   metric    result     pool</text>
  <line x1="864" y1="112" x2="1148" y2="112" stroke="#30363d" stroke-width="1"/>

  <!-- Iteration rows -->
  <text x="864" y="132" class="mono" font-size="11" fill="#30a14e">001    94.2      ✓ keep     4/6</text>
  <text x="864" y="150" class="mono" font-size="11" fill="#f85149">002    93.8      ✗ discard  4/6</text>
  <text x="864" y="168" class="mono" font-size="11" fill="#30a14e">003    96.1      ✓ keep     5/6</text>
  <text x="864" y="186" class="mono" font-size="11" fill="#30a14e">004    97.4      ✓ keep     5/6</text>
  <text x="864" y="204" class="mono" font-size="11" fill="#f85149">005    97.1      ✗ discard  5/6</text>
  <text x="864" y="222" class="mono" font-size="11" fill="#30a14e">006    99.0      ✓ keep     6/6</text>
  <text x="864" y="240" class="mono" font-size="11" fill="#30a14e">007    99.3      ✓ keep     6/6</text>
  <text x="864" y="258" class="mono" font-size="11" fill="#6e7681">008    ...                  ...</text>

  <!-- Meta-learning indicator -->
  <text x="864" y="280" class="mono" font-size="9" fill="#f0883e">[loop-002] meta: strategy pivot</text>
  <text x="864" y="294" class="mono" font-size="9" fill="#f0883e">[loop-002] memory: 7 patterns</text>

  <!-- Best metric footer bar -->
  <rect x="848" y="312" width="316" height="62" fill="#0d2818"/>
  <rect x="857" y="320" width="3" height="36" rx="1.5" fill="#30a14e"/>
  <text x="870" y="334" class="mono" font-size="11" fill="#30a14e">best: 99.3  (+5.1%)  5 kept</text>
  <text x="870" y="350" class="mono" font-size="11" fill="#6e7681">→ autoresearch-report.md</text>
  <text x="870" y="366" class="mono" font-size="9" fill="#8b949e">→ autoresearch-memory.md</text>
</svg>